name: Secret Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tracked-secret-guard:
    name: Tracked secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Check tracked files for secrets
        run: bash native/Scripts/check-no-secrets.sh
