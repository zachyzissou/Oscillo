name: Native macOS

on:
  pull_request:
    branches: [main]
    paths:
      - 'native/**'
      - '.github/workflows/native-macos.yml'
  push:
    branches: [main]
    paths:
      - 'native/**'
      - '.github/workflows/native-macos.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Swift tests and macOS app bundle
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-version

      - name: Swift tests
        working-directory: native
        run: swift test

      - name: Build signed local app bundle
        working-directory: native
        run: ./Scripts/build-macos-app.sh

      - name: Verify app signature
        working-directory: native
        run: codesign --verify --deep --strict dist/Oscillo.app

      - name: Verify bundled framework rpath
        working-directory: native
        run: |
          if ! otool -l dist/Oscillo.app/Contents/MacOS/OscilloMac | grep -q '@executable_path/../Frameworks'; then
            echo "OscilloMac is missing @executable_path/../Frameworks rpath for bundled frameworks" >&2
            exit 66
          fi

      - name: Zip app artifact
        working-directory: native
        run: |
          rm -f dist/Oscillo-macOS-ci.zip
          ditto -c -k --keepParent dist/Oscillo.app dist/Oscillo-macOS-ci.zip
          shasum -a 256 dist/Oscillo-macOS-ci.zip | tee dist/Oscillo-macOS-ci.zip.sha256

      - name: Upload native app artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Oscillo-macOS-ci
          path: |
            native/dist/Oscillo-macOS-ci.zip
            native/dist/Oscillo-macOS-ci.zip.sha256
          if-no-files-found: error
          retention-days: 14
